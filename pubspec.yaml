name: ciranda_app
description: Aplicativo oficial da Ciranda Mídia para o cenário junino brasileiro.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.8

  # Google
  google_sign_in: ^6.2.1
  google_maps_flutter: ^2.6.0

  # State & Navigation
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Utils
  share_plus: ^9.0.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  url_launcher: ^6.3.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/placeholder.png

  # Fontes carregadas via google_fonts (sem necessidade de arquivos locais)
